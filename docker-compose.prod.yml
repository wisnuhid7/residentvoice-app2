services:
  api:
    image: ghcr.io/wisnuhid7/residetvoice:api-1.0
    environment:
      NODE_ENV: production
      PORT: "5001"
      DATABASE_URL: postgresql://postgres:postgres123@192.168.101.102:5532/residence_db
      SESSION_SECRET: change-this-secret-in-production
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/wisnuhid7/residetvoice:front-1.0
    ports:
      - "8092:80"
    depends_on:
      - api
    restart: unless-stopped
