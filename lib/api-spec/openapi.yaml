          type: string

    BuildingSettings:
      type: object
      required: [id, buildingId]
      properties:
        id:
          type: integer
        buildingId:
          type: integer
        verificationMethod:
          type: string
          enum: [manual_approval, invite_code, document_upload]
        allowTenantOfficialVotes:
          type: boolean
        oneVotePerUnit:
          type: boolean
        passPercentage:
          type: integer
        allowAnonymousPosts:
          type: boolean
        inviteCode:
          type: ["string", "null"]

    BuildingSettingsUpdate:
      type: object
      properties:
        verificationMethod:
          type: string
        allowTenantOfficialVotes:
          type: boolean
        oneVotePerUnit:
          type: boolean
        passPercentage:
          type: integer
        allowAnonymousPosts:
          type: boolean
        inviteCode:
          type: string

    BuildingStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, pending, suspended]

    BuildingAdminView:
      type: object
      required: [id, name, slug, city, country, status, plan, residentCount, issueCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        city:
          type: string
        country:
          type: string
        status:
          type: string
        plan:
          type: string
        residentCount:
          type: integer
        issueCount:
          type: integer
        createdAt:
          type: string

    # ─── Dashboard ─────────────────────────────────────────────────────────────

    DashboardSummary:
      type: object
      required: [topIssues, recentIssues, openIssueCount, resolvedIssueCount, residentCount, activeResolutionCount, recentAnnouncements]
      properties:
        topIssues:
          type: array
          items:
            $ref: "#/components/schemas/IssueSummary"
        recentIssues:
          type: array
          items:
            $ref: "#/components/schemas/IssueSummary"
        openIssueCount:
          type: integer
        resolvedIssueCount:
          type: integer
        residentCount:
          type: integer
        activeResolutionCount:
          type: integer
        recentAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        issuesByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        issuesByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    # ─── Issue Categories ─────────────────────────────────────────────────────

    IssueCategory:
      type: object
      required: [id, buildingId, name, createdAt]
      properties:
        id:
          type: integer
        buildingId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        createdAt:
          type: string

    IssueCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    # ─── Issues ───────────────────────────────────────────────────────────────

    IssueSummary:
      type: object
      required: [id, buildingId, title, status, urgency, createdAt, voteCount, commentCount, affectedCount]
      properties:
        id:
          type: integer
        buildingId:
          type: integer
        title:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, emergency]
        status:
          type: string
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        voteCount:
          type: integer
        commentCount:
          type: integer
        affectedCount:
          type: integer
        createdAt:
          type: string
        submittedBy:
          type: ["string", "null"]
        hasVoted:
          type: boolean
        isAffected:
          type: boolean

    Issue:
      type: object
      required: [id, buildingId, title, description, status, urgency, locationType, affectsSafety, affectsMultipleResidents, isRecurring, anonymousPublic, voteCount, commentCount, affectedCount, createdAt]
      properties:
        id:
          type: integer
        buildingId:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [new, verified, duplicate, sent_to_admin, waiting_response, in_review, in_progress, vendor_scheduled, resolved, rejected, reopened]
        urgency:
          type: string
          enum: [low, medium, high, emergency]
        locationType:
          type: string
        locationText:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        isRecurring:
          type: boolean
        startedAt:
          type: ["string", "null"]
        affectsSafety:
          type: boolean
        affectsMultipleResidents:
          type: ["string", "null"]
        suggestedSolution:
          type: ["string", "null"]
        anonymousPublic:
          type: boolean
        voteCount:
          type: integer
        commentCount:
          type: integer
        affectedCount:
          type: integer
        hasVoted:
          type: boolean
        isAffected:
          type: boolean
        submittedBy:
          type: ["string", "null"]
        submittedByFloor:
          type: ["integer", "null"]
        adminResponse:
          type: ["string", "null"]
        estimatedCompletionDate:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    IssueInput:
      type: object
      required: [title, description, locationType, urgency, isRecurring, affectsSafety, affectsMultipleResidents, anonymousPublic]
      properties:
        title:
          type: string
        categoryId:
          type: integer
        description:
          type: string
        locationType:
          type: string
          enum: [lobby, elevator, floor, apartment, garage, roof, pool, gym, hallway, stairs, other]
        locationText:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, emergency]
        isRecurring:
          type: boolean
        startedAt:
          type: string
        affectsSafety:
          type: boolean
        affectsMultipleResidents:
          type: string
          enum: [yes, no, not_sure]
        suggestedSolution:
          type: string
        anonymousPublic:
          type: boolean

    IssueUpdate:
      type: object
      properties:
        status:
          type: string
        adminResponse:
          type: string
        estimatedCompletionDate:
          type: string
        urgency:
          type: string

    IssueVoteInput:
      type: object
      required: [voteType]
      properties:
        voteType:
          type: string
          enum: [important, affected]

    IssueComment:
      type: object
      required: [id, issueId, comment, anonymousPublic, createdAt]
      properties:
        id:
          type: integer
        issueId:
          type: integer
        comment:
          type: string
        anonymousPublic:
          type: boolean
        authorName:
          type: ["string", "null"]
        authorRole:
          type: ["string", "null"]
        isAdminResponse:
          type: boolean
        createdAt:
          type: string

    IssueCommentInput:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
        anonymousPublic:
          type: boolean

    IssueStatusHistory:
      type: object
      required: [id, issueId, newStatus, createdAt]
      properties:
        id:
          type: integer
        issueId:
          type: integer
        oldStatus:
          type: ["string", "null"]
        newStatus:
          type: string
        note:
          type: ["string", "null"]
        changedBy:
          type: ["string", "null"]
        changedByRole:
          type: ["string", "null"]
        createdAt:
          type: string

    VoteResult:
      type: object
      required: [count, hasVoted]
      properties:
        count:
