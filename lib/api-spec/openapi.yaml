          type: ["string", "null"]

    # ─── Solutions ────────────────────────────────────────────────────────────

    Solution:
      type: object
      required: [id, issueId, title, description, voteCount, hasVoted, createdAt]
      properties:
        id:
          type: integer
        issueId:
          type: integer
        title:
          type: string
        description:
          type: string
        estimatedCost:
          type: ["string", "null"]
        pros:
          type: ["string", "null"]
        cons:
          type: ["string", "null"]
        voteCount:
          type: integer
        hasVoted:
          type: boolean
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string

    SolutionInput:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
        description:
          type: string
        estimatedCost:
          type: string
        pros:
          type: string
        cons:
          type: string

    # ─── Resolutions ─────────────────────────────────────────────────────────

    Resolution:
      type: object
      required: [id, buildingId, title, description, proposedAction, votingType, eligibleVoters, status, createdAt]
      properties:
        id:
          type: integer
        buildingId:
          type: integer
        title:
          type: string
        description:
          type: string
        proposedAction:
          type: string
        votingType:
          type: string
          enum: [informal, official, petition]
        eligibleVoters:
          type: string
          enum: [owners_only, tenants_only, all_residents, one_per_unit]
        oneVotePerUnit:
          type: boolean
        passPercentage:
          type: integer
        status:
          type: string
          enum: [draft, open, closed, passed, failed]
        relatedIssueId:
          type: ["integer", "null"]
        votingStartAt:
          type: ["string", "null"]
        votingEndAt:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ResolutionDetail:
      allOf:
        - $ref: "#/components/schemas/Resolution"
        - type: object
          required: [yesCount, noCount, abstainCount, totalVotes, totalEligible, passed]
          properties:
            yesCount:
              type: integer
            noCount:
              type: integer
            abstainCount:
              type: integer
            totalVotes:
              type: integer
            totalEligible:
              type: integer
            passed:
              type: ["boolean", "null"]
            userVote:
              type: ["string", "null"]

    ResolutionInput:
      type: object
      required: [title, description, proposedAction, votingType, eligibleVoters]
      properties:
        title:
          type: string
        description:
          type: string
        proposedAction:
          type: string
        relatedIssueId:
          type: integer
        votingType:
          type: string
          enum: [informal, official, petition]
        eligibleVoters:
          type: string
          enum: [owners_only, tenants_only, all_residents, one_per_unit]
        oneVotePerUnit:
          type: boolean
        passPercentage:
          type: integer
        votingEndAt:
          type: string

    ResolutionVoteInput:
      type: object
      required: [vote]
      properties:
        vote:
          type: string
          enum: [yes, no, abstain]
        comment:
          type: string

    ResolutionStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, closed, passed, failed]

