openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ResidentVoice Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: buildings
  - name: residents
  - name: issues
  - name: solutions
  - name: resolutions
  - name: announcements
  - name: dashboard
  - name: superadmin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ────────────────────────────────────────────────────────────────────

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithBuilding"
        "401":
          description: Unauthenticated

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithBuilding"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/register-building:
    post:
      operationId: registerBuilding
      tags: [auth]
      summary: Register a new building with admin account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildingRegistrationInput"
      responses:
        "201":
          description: Building registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithBuilding"
        "400":
          description: Validation error
        "409":
          description: Slug already taken

  /auth/register-resident:
    post:
      operationId: registerResident
      tags: [auth]
      summary: Register as a resident in a building
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentRegistrationInput"
      responses:
        "201":
          description: Resident registered (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithBuilding"
        "400":
          description: Validation error
        "404":
          description: Building not found

  # ─── Buildings ───────────────────────────────────────────────────────────────

  /buildings/slug/{slug}:
    get:
      operationId: getBuildingBySlug
      tags: [buildings]
      summary: Get building info by slug (public)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Building info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
        "404":
          description: Not found

  /buildings/{buildingId}:
    get:
      operationId: getBuilding
      tags: [buildings]
      summary: Get building details
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Building details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
    patch:
      operationId: updateBuilding
      tags: [buildings]
      summary: Update building info (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildingUpdate"
      responses:
        "200":
          description: Updated building
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"

  /buildings/{buildingId}/settings:
    get:
      operationId: getBuildingSettings
      tags: [buildings]
      summary: Get building settings
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Building settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSettings"
    patch:
      operationId: updateBuildingSettings
      tags: [buildings]
      summary: Update building settings (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildingSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSettings"

  # ─── Residents ───────────────────────────────────────────────────────────────

  /buildings/{buildingId}/residents:
    get:
      operationId: getResidents
      tags: [residents]
      summary: List residents (admin/moderator)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, verified, rejected, suspended]
      responses:
        "200":
          description: Residents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResidentUser"

  /buildings/{buildingId}/residents/{userId}/status:
    patch:
      operationId: updateResidentStatus
      tags: [residents]
      summary: Approve, reject, or suspend a resident (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentStatusUpdate"
      responses:
        "200":
          description: Updated resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentUser"

  # ─── Dashboard ───────────────────────────────────────────────────────────────

  /buildings/{buildingId}/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get building dashboard summary
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── Issue Categories ─────────────────────────────────────────────────────────

  /buildings/{buildingId}/categories:
    get:
      operationId: getCategories
      tags: [issues]
      summary: List issue categories for building
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueCategory"
    post:
      operationId: createCategory
      tags: [issues]
      summary: Create category (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueCategory"

  # ─── Issues ──────────────────────────────────────────────────────────────────

  /buildings/{buildingId}/issues:
    get:
      operationId: getIssues
      tags: [issues]
      summary: List issues in a building
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: urgency
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, most_voted, most_commented, urgent]
      responses:
        "200":
          description: Issues list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueSummary"
    post:
      operationId: createIssue
      tags: [issues]
      summary: Report a new issue
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueInput"
      responses:
        "201":
          description: Created issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /buildings/{buildingId}/issues/{issueId}:
    get:
      operationId: getIssue
      tags: [issues]
      summary: Get issue detail
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Issue detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
    patch:
      operationId: updateIssue
      tags: [issues]
      summary: Update issue status or details (admin/moderator)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueUpdate"
      responses:
        "200":
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /buildings/{buildingId}/issues/{issueId}/vote:
    post:
      operationId: voteOnIssue
      tags: [issues]
      summary: Vote on an issue (importance) or mark as affected
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueVoteInput"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"

  /buildings/{buildingId}/issues/{issueId}/comments:
    get:
      operationId: getIssueComments
      tags: [issues]
      summary: Get comments for an issue
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueComment"
    post:
      operationId: addIssueComment
      tags: [issues]
      summary: Add a comment to an issue
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueComment"

  /buildings/{buildingId}/issues/{issueId}/status-history:
    get:
      operationId: getIssueStatusHistory
      tags: [issues]
      summary: Get status change timeline for an issue
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueStatusHistory"

  # ─── Solutions ────────────────────────────────────────────────────────────────

  /buildings/{buildingId}/issues/{issueId}/solutions:
    get:
      operationId: getSolutions
      tags: [solutions]
      summary: List solutions for an issue
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Solutions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Solution"
    post:
      operationId: createSolution
      tags: [solutions]
      summary: Suggest a solution
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolutionInput"
      responses:
        "201":
          description: Solution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"

  /buildings/{buildingId}/issues/{issueId}/solutions/{solutionId}/vote:
    post:
      operationId: voteOnSolution
      tags: [solutions]
      summary: Vote for a solution
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
        - name: solutionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"

  # ─── Resolutions ─────────────────────────────────────────────────────────────

  /buildings/{buildingId}/resolutions:
    get:
      operationId: getResolutions
      tags: [resolutions]
      summary: List resolutions
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resolutions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resolution"
    post:
      operationId: createResolution
      tags: [resolutions]
      summary: Create a resolution
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolutionInput"
      responses:
        "201":
          description: Resolution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resolution"

  /buildings/{buildingId}/resolutions/{resolutionId}:
    get:
      operationId: getResolution
      tags: [resolutions]
      summary: Get resolution detail with vote totals
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: resolutionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resolution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionDetail"

  /buildings/{buildingId}/resolutions/{resolutionId}/vote:
    post:
      operationId: voteOnResolution
      tags: [resolutions]
      summary: Cast a vote on a resolution
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: resolutionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolutionVoteInput"
      responses:
        "200":
          description: Vote cast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"

  /buildings/{buildingId}/resolutions/{resolutionId}/status:
    patch:
      operationId: updateResolutionStatus
      tags: [resolutions]
      summary: Open or close voting (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: resolutionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolutionStatusUpdate"
      responses:
        "200":
          description: Updated resolution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resolution"

  # ─── Announcements ───────────────────────────────────────────────────────────

  /buildings/{buildingId}/announcements:
    get:
      operationId: getAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /buildings/{buildingId}/announcements/{announcementId}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement (admin)
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
        - name: announcementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Notifications ────────────────────────────────────────────────────────────

  /buildings/{buildingId}/notifications:
    get:
      operationId: getNotifications
      tags: [dashboard]
      summary: Get notifications for current user
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /buildings/{buildingId}/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [dashboard]
      summary: Mark all notifications as read
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Done

  # ─── Super Admin ─────────────────────────────────────────────────────────────

  /superadmin/buildings:
    get:
      operationId: superAdminGetBuildings
      tags: [superadmin]
      summary: List all buildings (super admin)
      responses:
        "200":
          description: All buildings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuildingAdminView"

  /superadmin/buildings/{buildingId}/status:
    patch:
      operationId: superAdminUpdateBuildingStatus
      tags: [superadmin]
      summary: Approve or suspend a building
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildingStatusUpdate"
      responses:
        "200":
          description: Updated building
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"

  /superadmin/stats:
    get:
      operationId: superAdminGetStats
      tags: [superadmin]
      summary: Platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── Auth / Users ─────────────────────────────────────────────────────────

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    BuildingRegistrationInput:
      type: object
      required: [buildingName, address, city, country, numberOfUnits, numberOfFloors, buildingType, adminFullName, adminEmail, adminPhone, password, slug]
      properties:
        buildingName:
          type: string
        slug:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        numberOfFloors:
          type: integer
        numberOfUnits:
          type: integer
        buildingType:
          type: string
          enum: [high_rise, condo, apartment, gated_community, residential_tower, mixed]
        adminFullName:
          type: string
        adminEmail:
          type: string
        adminPhone:
          type: string
        password:
          type: string
        adminRole:
          type: string

    ResidentRegistrationInput:
      type: object
      required: [buildingSlug, fullName, email, password, apartmentNumber, floor, residentType]
      properties:
        buildingSlug:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        apartmentNumber:
          type: string
        floor:
          type: integer
        residentType:
          type: string
          enum: [owner, tenant, family_member, property_manager]
        inviteCode:
          type: string

    UserWithBuilding:
      type: object
      required: [id, fullName, email, role, verificationStatus]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, building_admin, moderator, resident_owner, resident_tenant]
        verificationStatus:
          type: string
          enum: [pending, verified, rejected, suspended]
        apartmentNumber:
          type: ["string", "null"]
        floor:
          type: ["integer", "null"]
        residentType:
          type: ["string", "null"]
        buildingId:
          type: ["integer", "null"]
        building:
          $ref: "#/components/schemas/Building"
          nullable: true

    ResidentUser:
      type: object
      required: [id, fullName, email, role, verificationStatus, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
        verificationStatus:
          type: string
        apartmentNumber:
          type: ["string", "null"]
        floor:
          type: ["integer", "null"]
        residentType:
          type: ["string", "null"]
        createdAt:
          type: string

    ResidentStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [verified, rejected, suspended, pending]
        reason:
          type: string

    # ─── Buildings ─────────────────────────────────────────────────────────────

    Building:
      type: object
      required: [id, name, slug, city, country, status, plan, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        address:
          type: ["string", "null"]
        city:
          type: string
        state:
          type: ["string", "null"]
        country:
          type: string
        timezone:
          type: ["string", "null"]
        numberOfUnits:
          type: ["integer", "null"]
        numberOfFloors:
          type: ["integer", "null"]
        buildingType:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, pending, suspended]
        plan:
          type: string
          enum: [free, basic, pro, enterprise]
        createdAt:
          type: string

    BuildingUpdate:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        timezone:
          type: string
        numberOfUnits:
          type: integer
        numberOfFloors:
          type: integer
        buildingType:
          type: string
        logoUrl:
          type: string
