    PlatformStats:
      type: object
      required: [totalBuildings, activeBuildings, totalResidents, totalIssues, totalResolutions]
      properties:
        totalBuildings:
          type: integer
        activeBuildings:
          type: integer
        totalResidents:
          type: integer
        totalIssues:
          type: integer
        totalResolutions:
          type: integer
        buildingsByPlan:
          type: array
