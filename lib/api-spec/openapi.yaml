          type: integer
        title:
          type: string
        message:
          type: string
        category:
          type: string
          enum: [general, emergency, maintenance, meeting, financial, security]
        priority:
          type: ["string", "null"]
        publishAt:
          type: ["string", "null"]
        expireAt:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string

    AnnouncementInput:
      type: object
      required: [title, message, category]
      properties:
        title:
          type: string
        message:
          type: string
        category:
          type: string
          enum: [general, emergency, maintenance, meeting, financial, security]
        priority:
          type: string
        publishAt:
          type: string
        expireAt:
          type: string

    # ─── Notifications ────────────────────────────────────────────────────────

    Notification:
      type: object
      required: [id, title, message, type, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
        readAt:
          type: ["string", "null"]
        createdAt:
          type: string

